<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Juego de Cubos con Puntos</title>
<style>
  body {
    margin: 0;
    overflow: hidden;
    background-color: #f0f0f0;
    font-family: sans-serif;
  }

  #gameArea {
    position: relative;
    width: 800px;
    height: 600px;
    margin: 50px auto;
    background-color: #ddd;
    border: 2px solid #333;
    overflow: hidden;
  }

  .player {
    position: absolute;
    width: 30px;
    height: 30px;
    border-radius: 10px;
  }

  #playerBlue { background-color: blue; left:50px; top:50px; }
  #playerRed { background-color: red; left:700px; top:500px; }

  .obstacle {
    position: absolute;
    width: 40px;
    height: 40px;
    background-color: #555;
    border-radius: 5px;
  }

  .particle {
    position: absolute;
    width: 6px;
    height: 6px;
    background-color: #fff;
    opacity: 0.8;
    border-radius: 50%;
    pointer-events: none;
  }

  #scoreBoard {
    position: absolute;
    top: 5px;
    left: 50%;
    transform: translateX(-50%);
    font-size: 24px;
    font-weight: bold;
    z-index: 1000;
  }

  #gameOverScreen {
    position: absolute;
    width: 100%;
    height: 100%;
    top: 0; left: 0;
    background-color: rgba(0,0,0,0.8);
    color: white;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    font-size: 48px;
    display: none;
    text-align: center;
  }

  #restartBtn {
    margin-top: 20px;
    padding: 10px 20px;
    font-size: 24px;
    cursor: pointer;
  }
</style>
</head>
<body>

<div id="gameArea">
  <div id="scoreBoard">Azul: 0 | Rojo: 0</div>
  <div id="playerBlue" class="player"></div>
  <div id="playerRed" class="player"></div>
  <div id="gameOverScreen">
    Game Over
    <button id="restartBtn">Restart</button>
  </div>
</div>

<script>
const gameArea = document.getElementById("gameArea");
const blue = document.getElementById("playerBlue");
const red = document.getElementById("playerRed");
const gameOverScreen = document.getElementById("gameOverScreen");
const restartBtn = document.getElementById("restartBtn");
const scoreBoard = document.getElementById("scoreBoard");

const cubeSize = 30;
const blueSpeed = 5;
const redSpeed = 5;
let bluePos = {x:50,y:50};
let redPos = {x:700,y:500};
let keys = {};
let gamePaused = false;
let obstacles = [];
const minDistance = 100;
const obstacleCount = 8;

// Sistema de puntos
let score = { blue: 0, red: 0 };
const maxScore = 3;

function updateScore(){
  scoreBoard.textContent = `Azul: ${score.blue} | Rojo: ${score.red}`;
}

// Función para generar obstáculos seguros
function generateObstacle(){
  let x, y, safe=false;
  while(!safe){
    x = Math.random()*(gameArea.clientWidth-40);
    y = Math.random()*(gameArea.clientHeight-40);
    const dxBlue = x - bluePos.x;
    const dyBlue = y - bluePos.y;
    const dxRed = x - redPos.x;
    const dyRed = y - redPos.y;
    safe = Math.abs(dxBlue)>minDistance || Math.abs(dyBlue)>minDistance;
    safe = safe && (Math.abs(dxRed)>minDistance || Math.abs(dyRed)>minDistance);
  }
  const obs = document.createElement('div');
  obs.classList.add('obstacle');
  obs.style.left = x+'px';
  obs.style.top = y+'px';
  gameArea.appendChild(obs);
  obstacles.push(obs);
}

// Crear obstáculos iniciales
for(let i=0;i<obstacleCount;i++) generateObstacle();

document.addEventListener('keydown', e => keys[e.key]=true);
document.addEventListener('keyup', e => keys[e.key]=false);

function movePlayer(){
  if(!gamePaused){
    let moved=false;

    // Azul (WASD)
    if(keys['w']) {bluePos.y -= blueSpeed; moved=true;}
    if(keys['s']) {bluePos.y += blueSpeed; moved=true;}
    if(keys['a']) {bluePos.x -= blueSpeed; moved=true;}
    if(keys['d']) {bluePos.x += blueSpeed; moved=true;}

    // Rojo (Flechas)
    if(keys['ArrowUp']) {redPos.y -= redSpeed; moved=true;}
    if(keys['ArrowDown']) {redPos.y += redSpeed; moved=true;}
    if(keys['ArrowLeft']) {redPos.x -= redSpeed; moved=true;}
    if(keys['ArrowRight']) {redPos.x += redSpeed; moved=true;}

    // Mantener dentro del área
    bluePos.x = Math.max(0, Math.min(bluePos.x, gameArea.clientWidth - cubeSize));
    bluePos.y = Math.max(0, Math.min(bluePos.y, gameArea.clientHeight - cubeSize));
    redPos.x = Math.max(0, Math.min(redPos.x, gameArea.clientWidth - cubeSize));
    redPos.y = Math.max(0, Math.min(redPos.y, gameArea.clientHeight - cubeSize));

    // Actualizar posiciones
    blue.style.left = bluePos.x+'px';
    blue.style.top = bluePos.y+'px';
    red.style.left = redPos.x+'px';
    red.style.top = redPos.y+'px';

    // Colisión entre jugadores → punto para el jugador que toca
    if(isColliding(bluePos, redPos)){
      // Ejemplo: rojo toca azul → rojo gana
      score.red++;
      updateScore();
      checkWinner();
      gamePaused=true;
      gameOverScreen.style.display='flex';
    }

    // Colisión con obstáculos
    for(const obs of obstacles){
      const obsPos = {x: parseFloat(obs.style.left), y: parseFloat(obs.style.top)};
      if(isColliding(bluePos, obsPos) || isColliding(redPos, obsPos)){
        if(isColliding(bluePos, obsPos)) {bluePos.x -= keys['a']?-blueSpeed: keys['d']?blueSpeed:0; bluePos.y -= keys['w']?-blueSpeed: keys['s']?blueSpeed:0;}
        if(isColliding(redPos, obsPos)) {redPos.x -= keys['ArrowLeft']?-redSpeed: keys['ArrowRight']?redSpeed:0; redPos.y -= keys['ArrowUp']?-redSpeed: keys['ArrowDown']?redSpeed:0;}
      }
    }

    // Partículas si se movió
    if(moved) createParticles();
  }
  requestAnimationFrame(movePlayer);
}

function isColliding(a,b){
  return !(a.x + cubeSize < b.x || a.x > b.x + (b.width||40) || a.y + cubeSize < b.y || a.y > b.y + (b.height||40));
}

function createParticles(){
  [bluePos, redPos].forEach((pos, i)=>{
    const particle = document.createElement('div');
    particle.classList.add('particle');
    particle.style.left = (pos.x + Math.random()*cubeSize)+'px';
    particle.style.top = (pos.y + Math.random()*cubeSize)+'px';
    gameArea.appendChild(particle);
    setTimeout(()=>particle.remove(), 300);
  });
}

function checkWinner(){
  if(score.blue>=maxScore){
    gamePaused=true;
    gameOverScreen.style.display='flex';
    gameOverScreen.textContent = '';
    const msg = document.createElement('div');
    msg.textContent = 'El jugador azul ganó';
    msg.style.color='blue';
    gameOverScreen.appendChild(msg);
    gameOverScreen.appendChild(restartBtn);
  } else if(score.red>=maxScore){
    gamePaused=true;
    gameOverScreen.style.display='flex';
    gameOverScreen.textContent = '';
    const msg = document.createElement('div');
    msg.textContent = 'El jugador rojo ganó';
    msg.style.color='red';
    gameOverScreen.appendChild(msg);
    gameOverScreen.appendChild(restartBtn);
  }
}

restartBtn.addEventListener('click', ()=>{
  bluePos={x:50,y:50}; redPos={x:700,y:500};
  keys={}; gamePaused=false;

  // Reiniciar obstáculos
  obstacles.forEach(o=>o.remove());
  obstacles=[];
  for(let i=0;i<obstacleCount;i++) generateObstacle();

  // Reiniciar puntaje
  score.blue=0; score.red=0;
  updateScore();

  gameOverScreen.style.display='none';
});

updateScore();
movePlayer();
</script>

</body>
</html>
